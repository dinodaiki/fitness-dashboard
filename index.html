<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daiki's Fitness Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f8ef7;
      --accent2: #34d399;
      --warn: #f59e0b;
      --danger: #ef4444;
      --text: #e2e8f0;
      --text-muted: #7c8db5;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }

    .header-left h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4f8ef7, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-left p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .kw-select-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .kw-select-wrap label {
      font-size: 0.85rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:hover, select:focus { border-color: var(--accent); }

    /* GRID */
    .container { max-width: 1200px; margin: 0 auto; }

    /* KPI CARDS */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .kpi-card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .kpi-card.blue::before  { background: var(--accent); }
    .kpi-card.green::before { background: var(--accent2); }
    .kpi-card.warn::before  { background: var(--warn); }
    .kpi-card.purple::before { background: #a78bfa; }

    .kpi-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .kpi-card.blue  .kpi-value { color: var(--accent); }
    .kpi-card.green .kpi-value { color: var(--accent2); }
    .kpi-card.warn  .kpi-value { color: var(--warn); }
    .kpi-card.purple .kpi-value { color: #a78bfa; }

    .kpi-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .kpi-sub span.pos { color: var(--accent2); }
    .kpi-sub span.neg { color: var(--danger); }

    /* PROGRESS BAR */
    .progress-bar {
      background: var(--border);
      border-radius: 9999px;
      height: 6px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.6s ease;
    }

    /* SECTION TITLES */
    .section-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* CHARTS */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .chart-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }

    .chart-grid-3 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .chart-grid-3 .chart-card {
      margin-bottom: 0;
    }

    canvas { display: block; width: 100% !important; }

    /* TRAINING PLAN */
    .training-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .training-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 480px) {
      .training-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .training-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }

    .training-card.active {
      border-color: var(--accent);
      background: rgba(79, 142, 247, 0.08);
    }

    .training-card.rest {
      opacity: 0.5;
    }

    .training-card:hover { transform: translateY(-2px); }

    .training-day {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .training-emoji {
      font-size: 1.6rem;
      margin-bottom: 8px;
      display: block;
    }

    .training-desc {
      font-size: 0.72rem;
      color: var(--text);
      line-height: 1.3;
    }

    /* TABLE */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 12px 14px;
      color: var(--text);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 9999px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .badge-ok   { background: rgba(52, 211, 153, 0.15); color: var(--accent2); }
    .badge-warn { background: rgba(245, 158, 11, 0.15); color: var(--warn); }
    .badge-bad  { background: rgba(239, 68, 68, 0.12);  color: var(--danger); }

    /* COACH COMMENT */
    .coach-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 24px;
      position: relative;
    }

    .coach-card .coach-icon {
      font-size: 2rem;
      position: absolute;
      top: -14px;
      left: 18px;
    }

    .coach-card p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--text);
      margin-top: 6px;
    }

    /* ZEITRAUM BADGE */
    .zeitraum-badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 4px 14px;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      font-size: 0.9rem;
      gap: 8px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>💪 Daiki's Fitness Dashboard</h1>
      <p>Persönlicher Wochenbericht · Ziel: 92kg bis 30. Juni 2026</p>
    </div>
    <div class="kw-select-wrap">
      <label for="kwSelect">Kalenderwoche:</label>
      <select id="kwSelect">
        <option value="16" selected>KW 16 (aktuell)</option>
        <option value="15">KW 15</option>
      </select>
    </div>
  </div>

  <div id="dashboard">
    <div class="loading"><div class="spinner"></div> Lade Daten…</div>
  </div>

  <footer>
    Generiert am <span id="genDate"></span> · Daiki Fitness Dashboard 2026
  </footer>

</div>

<script>
// ─── HELPERS ────────────────────────────────────────────────────────────────

const ALL_WEIGHT_POINTS = [
  { datum: '2026-03-30', wert: 99.7 },
  { datum: '2026-04-06', wert: 99.3 },
  { datum: '2026-04-07', wert: 98.4 },
  { datum: '2026-04-08', wert: 98.5 },
  { datum: '2026-04-13', wert: 98.4 },
  { datum: '2026-04-15', wert: 97.7 },
  { datum: '2026-04-17', wert: 98.1 },
  { datum: '2026-04-18', wert: 96.8 },
  { datum: '2026-04-19', wert: 96.3 },
];

const GOAL_LINE = [
  { datum: '2026-03-30', wert: 99.7 },
  { datum: '2026-06-30', wert: 92.0 },
];

const START_WEIGHT  = 99.7;
const GOAL_WEIGHT   = 92.0;

function fmt(n, dec = 1) {
  return Number(n).toFixed(dec);
}

function badge(ok, warnCond) {
  if (ok)       return '<span class="badge badge-ok">✅ Erreicht</span>';
  if (warnCond) return '<span class="badge badge-warn">⚠️ Knapp</span>';
  return           '<span class="badge badge-bad">❌ Verfehlt</span>';
}

const chartDefaults = {
  responsive: true,
  maintainAspectRatio: true,
  plugins: {
    legend: {
      labels: { color: '#7c8db5', font: { size: 11 }, boxWidth: 12 }
    }
  },
  scales: {
    x: { ticks: { color: '#7c8db5', font: { size: 10 } }, grid: { color: '#1e2235' } },
    y: { ticks: { color: '#7c8db5', font: { size: 10 } }, grid: { color: '#1e2235' } }
  }
};

let charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => c && c.destroy());
  charts = {};
}

// ─── RENDER ─────────────────────────────────────────────────────────────────

function render(data) {
  destroyCharts();

  const diff    = data.gewicht.differenz;
  const current = data.gewicht.ende;
  const lost    = START_WEIGHT - current;
  const toGoal  = START_WEIGHT - GOAL_WEIGHT;
  const progress = Math.min(100, (lost / toGoal) * 100);

  const diffSign = diff < 0 ? '' : '+';
  const diffClass = diff < 0 ? 'pos' : 'neg';

  // ── KPI CARDS ──────────────────────────────────────────────────────────────
  const kpiHtml = `
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">Aktuelles Gewicht</div>
        <div class="kpi-value">${fmt(current)} <small style="font-size:1rem">kg</small></div>
        <div class="kpi-sub">Startgewicht: ${START_WEIGHT} kg</div>
      </div>
      <div class="kpi-card ${diff < 0 ? 'green' : 'warn'}">
        <div class="kpi-label">Differenz Vorwoche</div>
        <div class="kpi-value">${diffSign}${fmt(diff)} <small style="font-size:1rem">kg</small></div>
        <div class="kpi-sub">
          Gesamt: <span class="${diffClass}">${fmt(-lost)} kg</span>
        </div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">Fortschritt zum Ziel</div>
        <div class="kpi-value">${fmt(progress, 0)}<small style="font-size:1rem">%</small></div>
        <div class="kpi-sub">Noch ${fmt(current - GOAL_WEIGHT)} kg bis 92 kg</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${progress}%"></div>
        </div>
      </div>
      <div class="kpi-card ${data.trainingstage >= 5 ? 'green' : 'warn'}">
        <div class="kpi-label">Trainingstage KW ${data.kw}</div>
        <div class="kpi-value">${data.trainingstage}<small style="font-size:1rem">/7</small></div>
        <div class="kpi-sub">${data.trainingstage >= 5 ? '🔥 Starke Woche!' : '📈 Mehr geht!'}</div>
      </div>
    </div>
  `;

  // ── TRAINING KACHELN ───────────────────────────────────────────────────────
  const trainingHtml = data.training.map(t => {
    const isRest = t.einheit === 'Ruhetag';
    return `
      <div class="training-card ${isRest ? 'rest' : 'active'}">
        <div class="training-day">${t.tag}</div>
        <span class="training-emoji">${t.emoji}</span>
        <div class="training-desc">${t.einheit}</div>
      </div>
    `;
  }).join('');

  // ── TABELLE ────────────────────────────────────────────────────────────────
  const kal   = data.kalorien;
  const prot  = data.protein;
  const steps = data.schritte;

  const kalOk    = kal.ist >= kal.ziel_min && kal.ist <= kal.ziel_max;
  const kalWarn  = kal.ist >= kal.ziel_min * 0.9;
  const protOk   = prot.ist >= prot.ziel_min;
  const protWarn = prot.ist >= prot.ziel_min * 0.9;
  const stepOk   = steps.ist >= steps.ziel;
  const stepWarn = steps.ist >= steps.ziel * 0.95;

  const tableHtml = `
    <table>
      <thead>
        <tr>
          <th>Metrik</th>
          <th>Ist-Wert</th>
          <th>Ziel</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>⚡ Kalorien (Ø)</td>
          <td>${kal.ist} kcal</td>
          <td>${kal.ziel_min}–${kal.ziel_max} kcal</td>
          <td>${badge(kalOk, kalWarn)}</td>
        </tr>
        <tr>
          <td>🥩 Protein (Ø)</td>
          <td>${prot.ist}g</td>
          <td>${prot.ziel_min}–${prot.ziel_max}g</td>
          <td>${badge(protOk, protWarn)}</td>
        </tr>
        <tr>
          <td>👟 Schritte (Ø)</td>
          <td>${steps.ist.toLocaleString('de-DE')}</td>
          <td>${steps.ziel.toLocaleString('de-DE')}</td>
          <td>${badge(stepOk, stepWarn)}</td>
        </tr>
        <tr>
          <td>🏋️ Trainingstage</td>
          <td>${data.trainingstage}</td>
          <td>≥ 4</td>
          <td>${badge(data.trainingstage >= 4, data.trainingstage >= 3)}</td>
        </tr>
      </tbody>
    </table>
  `;

  // ── ASSEMBLE HTML ─────────────────────────────────────────────────────────
  document.getElementById('dashboard').innerHTML = `
    <div class="zeitraum-badge">📅 KW ${data.kw} · ${data.zeitraum}</div>

    <div class="section-title">KPI Übersicht</div>
    ${kpiHtml}

    <div class="section-title">Gewichtsverlauf</div>
    <div class="chart-card">
      <div class="chart-title">Gewicht (alle Messpunkte) + Ziellinie 92kg</div>
      <canvas id="chartWeight" height="90"></canvas>
    </div>

    <div class="section-title">Ernährung & Aktivität</div>
    <div class="chart-grid-3">
      <div class="chart-card">
        <div class="chart-title">⚡ Kalorien</div>
        <canvas id="chartKal" height="160"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">🥩 Protein</div>
        <canvas id="chartProt" height="160"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">👟 Schritte</div>
        <canvas id="chartSteps" height="160"></canvas>
      </div>
    </div>

    <div class="section-title">Trainingsplan KW ${data.kw}</div>
    <div class="training-grid">${trainingHtml}</div>

    <div class="section-title">Schlüsselzahlen</div>
    <div class="table-card">${tableHtml}</div>

    <div class="section-title">Coach-Kommentar</div>
    <div class="coach-card">
      <div class="coach-icon">🧑‍💼</div>
      <p>${data.coach_kommentar}</p>
    </div>
  `;

  // ── CHARTS ─────────────────────────────────────────────────────────────────
  buildWeightChart(data);
  buildBarChart('chartKal',  'Kalorien (kcal)',
    [`Ist: ${kal.ist}`, `Ziel min`, `Ziel max`],
    [kal.ist, kal.ziel_min, kal.ziel_max],
    ['#4f8ef7', '#34d399', '#a78bfa']);

  buildBarChart('chartProt', 'Protein (g)',
    [`Ist: ${prot.ist}g`, `Ziel min`, `Ziel max`],
    [prot.ist, prot.ziel_min, prot.ziel_max],
    ['#4f8ef7', '#34d399', '#a78bfa']);

  buildBarChart('chartSteps', 'Schritte',
    [`Ist: ${steps.ist.toLocaleString('de-DE')}`, `Ziel: ${steps.ziel.toLocaleString('de-DE')}`],
    [steps.ist, steps.ziel],
    ['#4f8ef7', '#34d399']);
}

// ── WEIGHT CHART (time scale) ──────────────────────────────────────────────

function buildWeightChart(data) {
  const ctx = document.getElementById('chartWeight').getContext('2d');

  const actualData = ALL_WEIGHT_POINTS.map(p => ({ x: p.datum, y: p.wert }));
  const goalData   = GOAL_LINE.map(p => ({ x: p.datum, y: p.wert }));

  // Highlight current week points
  const kwDates = new Set(data.gewicht.messpunkte.map(m => m.datum));
  const pointColors = actualData.map(p =>
    kwDates.has(p.x) ? '#34d399' : '#4f8ef7'
  );
  const pointRadius = actualData.map(p =>
    kwDates.has(p.x) ? 6 : 4
  );

  charts.weight = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Gewicht',
          data: actualData,
          borderColor: '#4f8ef7',
          backgroundColor: 'rgba(79,142,247,0.08)',
          fill: true,
          tension: 0.35,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: pointRadius,
          pointHoverRadius: 7,
          borderWidth: 2,
          order: 1,
        },
        {
          label: 'Ziel (92kg)',
          data: goalData,
          borderColor: '#f59e0b',
          borderDash: [6, 4],
          borderWidth: 1.5,
          pointRadius: 0,
          fill: false,
          tension: 0,
          order: 2,
        }
      ]
    },
    options: {
      ...chartDefaults,
      maintainAspectRatio: true,
      scales: {
        x: {
          type: 'time',
          time: {
            unit: 'week',
            tooltipFormat: 'dd.MM.yyyy',
            displayFormats: { week: 'dd.MM', day: 'dd.MM' }
          },
          ticks: { color: '#7c8db5', font: { size: 10 } },
          grid: { color: '#1e2235' }
        },
        y: {
          min: 91,
          max: 101,
          ticks: {
            color: '#7c8db5',
            font: { size: 10 },
            callback: v => v + ' kg',
            stepSize: 1
          },
          grid: { color: '#1e2235' }
        }
      },
      plugins: {
        legend: {
          labels: { color: '#7c8db5', font: { size: 11 }, boxWidth: 12 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} kg`
          }
        }
      }
    }
  });
}

// ── BAR CHART ──────────────────────────────────────────────────────────────

function buildBarChart(canvasId, label, labels, values, colors) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const max = Math.max(...values);

  charts[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label,
        data: values,
        backgroundColor: colors.map(c => c + '33'),
        borderColor: colors,
        borderWidth: 2,
        borderRadius: 7,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false }
      },
      scales: {
        x: {
          ticks: { color: '#7c8db5', font: { size: 10 } },
          grid: { color: '#1e2235' }
        },
        y: {
          min: 0,
          max: Math.ceil(max * 1.15),
          ticks: { color: '#7c8db5', font: { size: 10 } },
          grid: { color: '#1e2235' }
        }
      }
    }
  });
}

// ── LOAD DATA ──────────────────────────────────────────────────────────────

async function loadKW(kw) {
  document.getElementById('dashboard').innerHTML =
    '<div class="loading"><div class="spinner"></div> Lade KW ' + kw + '…</div>';
  try {
    const res  = await fetch(`data/kw${kw}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('dashboard').innerHTML =
      `<div class="loading" style="color:#ef4444">❌ Fehler beim Laden: ${e.message}</div>`;
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────

document.getElementById('genDate').textContent =
  new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

const sel = document.getElementById('kwSelect');
sel.addEventListener('change', () => loadKW(sel.value));
loadKW(sel.value);
</script>
</body>
</html>
