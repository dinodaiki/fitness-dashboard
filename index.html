<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daiki's Fitness Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --card:        #161b22;
      --card2:       #1c2128;
      --border:      #30363d;
      --accent:      #58a6ff;
      --green:       #3fb950;
      --orange:      #d29922;
      --red:         #f85149;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --radius:      12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(8px);
    }
    .header-left { display: flex; align-items: center; gap: 0.8rem; }
    .header-icon { font-size: 1.6rem; line-height: 1; }
    .header-title { font-size: 1.05rem; font-weight: 700; }
    .header-sub   { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    .kw-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .kw-select:focus { border-color: var(--accent); }

    /* ── Main layout ─────────────────────────────── */
    .main {
      max-width: 1380px;
      margin: 0 auto;
      padding: 1.75rem 2rem 4rem;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 2rem 0 .85rem;
    }

    /* ── Week strip ──────────────────────────────── */
    .week-strip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .9rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .5rem;
    }
    .strip-left { display: flex; align-items: center; gap: .9rem; }
    .kw-pill {
      background: var(--accent);
      color: #000;
      font-size: .78rem;
      font-weight: 800;
      padding: .25rem .75rem;
      border-radius: 20px;
    }
    .strip-date { font-size: .85rem; color: var(--muted); }
    .strip-right { font-size: .82rem; color: var(--muted); }
    .strip-right strong { color: var(--text); }

    /* ── KPI grid ────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.3rem;
      transition: border-color .2s, background .2s;
    }
    .kpi-card:hover { border-color: var(--accent); background: var(--card2); }
    .kpi-label {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .kpi-value {
      font-size: 1.95rem;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .kpi-sub { font-size: .78rem; color: var(--muted); margin-top: .35rem; }
    .kpi-badge {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      font-size: .72rem;
      font-weight: 600;
      padding: .2rem .55rem;
      border-radius: 20px;
      margin-top: .55rem;
    }
    .bg-green  { background: rgba(63,185,80,.15);  color: var(--green); }
    .bg-red    { background: rgba(248,81,73,.15);   color: var(--red); }
    .bg-orange { background: rgba(210,153,34,.15);  color: var(--orange); }
    .bg-blue   { background: rgba(88,166,255,.15);  color: var(--accent); }

    .prog-track {
      background: var(--border);
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
      margin-top: .6rem;
    }
    .prog-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), var(--green));
      transition: width .6s ease;
    }

    /* ── Chart cards ─────────────────────────────── */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
    }
    .chart-title {
      font-size: .85rem;
      font-weight: 600;
      margin-bottom: 1.1rem;
    }
    .chart-weight-wrap { height: 290px; }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .chart-small-wrap { height: 210px; }

    /* ── Training grid ───────────────────────────── */
    .training-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .75rem;
    }
    .training-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem .75rem;
      text-align: center;
      transition: all .2s;
    }
    .training-card.is-active {
      border-color: var(--accent);
      background: rgba(88,166,255,.06);
    }
    .t-day  { font-size: .65rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: .45rem; }
    .training-card.is-active .t-day { color: var(--accent); }
    .t-emoji { font-size: 1.7rem; display: block; margin-bottom: .45rem; }
    .t-label { font-size: .68rem; color: var(--muted); line-height: 1.45; }
    .training-card.is-active .t-label { color: var(--text); }

    /* ── Metrics table ───────────────────────────── */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .metrics-table { width: 100%; border-collapse: collapse; }
    .metrics-table th {
      text-align: left;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .75rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .metrics-table td {
      padding: .85rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-size: .88rem;
      vertical-align: middle;
    }
    .metrics-table tr:last-child td { border-bottom: none; }
    .metrics-table tbody tr:hover td { background: rgba(255,255,255,.018); }
    .metrics-table .val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .75rem;
      font-weight: 600;
      padding: .22rem .65rem;
      border-radius: 20px;
    }

    /* ── Coach box ───────────────────────────────── */
    .coach-box {
      background: linear-gradient(135deg, rgba(88,166,255,.07), rgba(63,185,80,.07));
      border: 1px solid rgba(88,166,255,.28);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
    }
    .coach-header { display: flex; align-items: center; gap: .85rem; margin-bottom: .9rem; }
    .coach-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; flex-shrink: 0;
    }
    .coach-name { font-weight: 700; font-size: .9rem; }
    .coach-role { font-size: .74rem; color: var(--muted); margin-top: 1px; }
    .coach-text { font-size: .9rem; line-height: 1.75; }
    .coach-notes {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(88,166,255,.2);
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Loading ─────────────────────────────────── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 55vh; font-size: 1.1rem; color: var(--muted);
      gap: .6rem;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 1100px) {
      .kpi-grid     { grid-template-columns: repeat(2, 1fr); }
      .training-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 760px) {
      .main          { padding: 1rem 1rem 3rem; }
      .header        { padding: .75rem 1rem; }
      .kpi-grid      { grid-template-columns: 1fr 1fr; }
      .chart-grid    { grid-template-columns: 1fr; }
      .training-grid { grid-template-columns: repeat(3, 1fr); }
      .week-strip    { flex-direction: column; align-items: flex-start; gap: .5rem; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="header-icon">💪</span>
    <div>
      <div class="header-title">Daiki's Fitness Dashboard</div>
      <div class="header-sub" id="headerSub">Wochenbericht wird geladen…</div>
    </div>
  </div>
  <select class="kw-select" id="kwSelect" onchange="loadKW(this.value)">
    <option value="16">KW 16 — 13.04 – 19.04</option>
    <option value="15">KW 15 — 07.04 – 13.04</option>
  </select>
</header>

<div class="main">
  <div id="dashboard">
    <div class="loading"><div class="spinner"></div>Lade Daten…</div>
  </div>
</div>

<script>
/* ── Constants ───────────────────────────────────── */
const GOAL_WEIGHT  = 92;
const GOAL_DATE    = '2026-06-30';
const START_WEIGHT = 99.7;
const START_DATE   = '2026-03-30';

Chart.defaults.color       = '#8b949e';
Chart.defaults.borderColor = '#30363d';
Chart.defaults.font.family = "-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif";
Chart.defaults.font.size   = 12;

let charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

/* ── Helpers ─────────────────────────────────────── */
function pct(v, t) { return Math.min(100, Math.max(0, (v / t) * 100)); }

function goalProgress(w) {
  return Math.min(100, Math.max(0, ((START_WEIGHT - w) / (START_WEIGHT - GOAL_WEIGHT)) * 100));
}

function signStr(v) { return (v < 0 ? '' : '+') + v.toFixed(1); }

function calStatus(v) {
  if (v >= 2000 && v <= 2200) return pill('bg-green', '✅ Im Zielbereich');
  if (v < 2000)               return pill('bg-orange', '⚠️ Zu niedrig');
  return                             pill('bg-orange', '⚠️ Zu hoch');
}

function pill(cls, txt) {
  return `<span class="status-pill ${cls}">${txt}</span>`;
}

function reached(v, min) {
  return v >= min ? pill('bg-green','✅ Erreicht') : pill('bg-orange', `⚠️ ${Math.round(pct(v,min))}% von Ziel`);
}

/* ── Render dashboard ────────────────────────────── */
function renderDashboard(data) {
  destroyCharts();

  const cw       = data.weightEnd;
  const wc       = data.weightChange;
  const prog     = goalProgress(cw);
  const rem      = (cw - GOAL_WEIGHT).toFixed(1);
  const tBadge   = data.trainingDays >= 5 ? 'bg-green' : 'bg-orange';
  const tBadgeTx = data.trainingDays >= 5 ? '✅ Stark' : '⚠️ Mehr möglich';

  const html = `
    <!-- Week strip -->
    <div class="section-label" style="margin-top:0">Überblick</div>
    <div class="week-strip">
      <div class="strip-left">
        <span class="kw-pill">KW ${data.kw}</span>
        <span class="strip-date">${data.dateRange}</span>
      </div>
      <div class="strip-right">Ziel: <strong>92 kg bis 30. Juni 2026</strong> &nbsp;·&nbsp; Start: <strong>99,7 kg (30.03.2026)</strong></div>
    </div>

    <!-- KPIs -->
    <div class="section-label">Kennzahlen der Woche</div>
    <div class="kpi-grid">

      <div class="kpi-card">
        <div class="kpi-label">Aktuelles Gewicht</div>
        <div class="kpi-value" style="color:var(--accent)">${cw.toFixed(1)} kg</div>
        <div class="kpi-sub">${rem} kg bis zum Zielgewicht</div>
        <div class="prog-track"><div class="prog-fill" style="width:${prog.toFixed(1)}%"></div></div>
        <span class="kpi-badge bg-blue">📊 ${prog.toFixed(1)}% des Ziels erreicht</span>
      </div>

      <div class="kpi-card">
        <div class="kpi-label">Gewichtsveränderung</div>
        <div class="kpi-value" style="color:${wc<=0?'var(--green)':'var(--red)'}">${signStr(wc)} kg</div>
        <div class="kpi-sub">gegenüber Wochenstartgewicht</div>
        <span class="kpi-badge ${wc<=0?'bg-green':'bg-red'}">${wc<=0?'▼ Abnahme':'▲ Zunahme'}</span>
      </div>

      <div class="kpi-card">
        <div class="kpi-label">Gesamtabnahme</div>
        <div class="kpi-value" style="color:var(--green)">−${(START_WEIGHT - cw).toFixed(1)} kg</div>
        <div class="kpi-sub">seit Startgewicht ${START_WEIGHT} kg (30.03)</div>
        <span class="kpi-badge bg-green">🎯 Ziel: ${GOAL_WEIGHT} kg am 30.06</span>
      </div>

      <div class="kpi-card">
        <div class="kpi-label">Trainingstage</div>
        <div class="kpi-value">${data.trainingDays} <span style="font-size:1.1rem;font-weight:400;color:var(--muted)">/ 7</span></div>
        <div class="kpi-sub">aktive Trainingstage diese Woche</div>
        <span class="kpi-badge ${tBadge}">${tBadgeTx}</span>
      </div>

    </div>

    <!-- Weight chart -->
    <div class="section-label">Gewichtsverlauf</div>
    <div class="chart-card">
      <div class="chart-title">Körpergewicht (kg) — alle Messpunkte + gestrichelte Ziellinie bis 92 kg am 30.06.2026</div>
      <div class="chart-weight-wrap"><canvas id="weightChart"></canvas></div>
    </div>

    <!-- Nutrition charts -->
    <div class="section-label">Ernährung &amp; Aktivität — Ø Ist-Wert vs. Ziel</div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">🍽️ Kalorien (kcal/Tag)</div>
        <div class="chart-small-wrap"><canvas id="calChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🥩 Protein (g/Tag)</div>
        <div class="chart-small-wrap"><canvas id="proteinChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">👟 Schritte (pro Tag)</div>
        <div class="chart-small-wrap"><canvas id="stepsChart"></canvas></div>
      </div>
    </div>

    <!-- Training plan -->
    <div class="section-label">Trainingsplan KW ${data.kw}</div>
    <div class="training-grid">
      ${data.training.map(t => `
        <div class="training-card ${t.active ? 'is-active' : ''}">
          <div class="t-day">${t.day}</div>
          <span class="t-emoji">${t.emoji}</span>
          <div class="t-label">${t.label}</div>
        </div>
      `).join('')}
    </div>

    <!-- Metrics table -->
    <div class="section-label">Schlüsselzahlen im Überblick</div>
    <div class="table-wrap">
      <table class="metrics-table">
        <thead>
          <tr>
            <th>Metrik</th>
            <th>Ø Ist-Wert</th>
            <th>Zielbereich</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>⚖️ Gewicht</td>
            <td class="val">${cw.toFixed(1)} kg</td>
            <td>≤ 92,0 kg</td>
            <td>${cw <= 92 ? pill('bg-green','✅ Ziel erreicht') : pill('bg-orange',`⚠️ noch ${rem} kg`)}</td>
          </tr>
          <tr>
            <td>🍽️ Kalorien</td>
            <td class="val">${data.avgCalories} kcal</td>
            <td>2000 – 2200 kcal</td>
            <td>${calStatus(data.avgCalories)}</td>
          </tr>
          <tr>
            <td>🥩 Protein</td>
            <td class="val">${data.avgProtein} g</td>
            <td>160 – 180 g</td>
            <td>${reached(data.avgProtein, 160)}</td>
          </tr>
          <tr>
            <td>👟 Schritte</td>
            <td class="val">${data.avgSteps.toLocaleString('de-DE')}</td>
            <td>11.000</td>
            <td>${reached(data.avgSteps, 11000)}</td>
          </tr>
          <tr>
            <td>🏋️ Trainingstage</td>
            <td class="val">${data.trainingDays} Tage</td>
            <td>≥ 5 Tage</td>
            <td>${data.trainingDays >= 5 ? pill('bg-green','✅ Erreicht') : pill('bg-red','❌ Nicht erreicht')}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Coach comment -->
    <div class="section-label">Coach-Kommentar</div>
    <div class="coach-box">
      <div class="coach-header">
        <div class="coach-avatar">🤖</div>
        <div>
          <div class="coach-name">Coach AI</div>
          <div class="coach-role">Persönlicher Fitness-Coach · KW ${data.kw} · ${data.dateRange}</div>
        </div>
      </div>
      <div class="coach-text">${data.coachComment}</div>
      ${data.notes ? `<div class="coach-notes">📝 <strong>Wochennotizen:</strong> ${data.notes}</div>` : ''}
    </div>
  `;

  document.getElementById('dashboard').innerHTML = html;

  requestAnimationFrame(() => {
    renderWeightChart(data);
    renderCompChart('calChart',     'Ø Kalorien', data.avgCalories, data.targetCalories, 'kcal', [88,166,255]);
    renderCompChart('proteinChart', 'Ø Protein',  data.avgProtein,  data.targetProtein,  'g',    [63,185,80]);
    renderCompChart('stepsChart',   'Ø Schritte', data.avgSteps,    data.targetSteps,    '',     [210,153,34]);
  });
}

/* ── Weight chart ────────────────────────────────── */
function renderWeightChart(data) {
  const ctx = document.getElementById('weightChart').getContext('2d');

  const actualPts = data.weightHistory.map(p => ({ x: p.date, y: p.weight }));
  const targetPts = [
    { x: START_DATE, y: START_WEIGHT },
    { x: GOAL_DATE,  y: GOAL_WEIGHT  }
  ];

  charts.weight = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {
          label: 'Gewicht (kg)',
          data: actualPts,
          borderColor: '#58a6ff',
          backgroundColor: 'rgba(88,166,255,.09)',
          pointBackgroundColor: '#58a6ff',
          pointBorderColor: '#0d1117',
          pointBorderWidth: 2,
          pointRadius: 5,
          pointHoverRadius: 7,
          borderWidth: 2.5,
          tension: 0.3,
          fill: true,
          order: 1,
        },
        {
          label: 'Ziellinie (92 kg)',
          data: targetPts,
          borderColor: '#3fb950',
          borderDash: [7, 4],
          borderWidth: 2,
          pointRadius: [0, 7],
          pointBackgroundColor: '#3fb950',
          pointBorderColor: '#0d1117',
          pointBorderWidth: 2,
          fill: false,
          tension: 0,
          order: 0,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          type: 'time',
          time: {
            unit: 'week',
            tooltipFormat: 'dd.MM.yyyy',
            displayFormats: { day: 'dd.MM', week: 'dd.MM' }
          },
          min: '2026-03-23',
          max: '2026-07-07',
          grid: { color: 'rgba(48,54,61,.45)' },
          ticks: { maxTicksLimit: 12, color: '#8b949e' },
          border: { display: false }
        },
        y: {
          min: 91,
          max: 101,
          grid: { color: 'rgba(48,54,61,.45)' },
          ticks: {
            callback: v => v + ' kg',
            stepSize: 1,
            color: '#8b949e'
          },
          border: { display: false }
        }
      },
      plugins: {
        legend: {
          labels: { color: '#8b949e', boxWidth: 14, padding: 16, font: { size: 12 } }
        },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)} kg`
          }
        }
      }
    }
  });
}

/* ── Comparison charts (Ist vs. Ziel) ───────────── */
function renderCompChart(id, labelIst, valIst, valZiel, unit, rgb) {
  const ctx   = document.getElementById(id).getContext('2d');
  const color = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
  const colorA = `rgba(${rgb[0]},${rgb[1]},${rgb[2]},.75)`;

  const lo   = Math.min(valIst, valZiel);
  const hi   = Math.max(valIst, valZiel);
  const pad  = (hi - lo) || hi * 0.05;
  const yMin = Math.max(0, Math.floor(lo - pad * 2.5));
  const yMax = Math.ceil(hi + pad * 1.5);

  const fmt = v => unit ? `${v.toLocaleString('de-DE')} ${unit}` : v.toLocaleString('de-DE');

  charts[id] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Ist', 'Ziel'],
      datasets: [{
        label: '',
        data: [valIst, valZiel],
        backgroundColor: [colorA, 'rgba(48,54,61,.7)'],
        borderColor:     [color,  'rgba(80,90,100,.9)'],
        borderWidth: 0,
        borderRadius: 7,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          min: yMin,
          max: yMax,
          grid: { color: 'rgba(48,54,61,.45)' },
          ticks: {
            callback: v => unit ? `${v.toLocaleString('de-DE')}` : v.toLocaleString('de-DE'),
            maxTicksLimit: 5,
            color: '#8b949e'
          },
          border: { display: false }
        },
        y: {
          grid: { display: false },
          ticks: { color: '#e6edf3', font: { weight: '600' } },
          border: { display: false }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128',
          borderColor: '#30363d',
          borderWidth: 1,
          padding: 10,
          callbacks: {
            title: items => items[0].label === 'Ist' ? labelIst : 'Zielwert',
            label: ctx  => ` ${fmt(ctx.parsed.x)}`
          }
        },
        annotation: {}
      }
    },
    plugins: [{
      id: 'valueLabels',
      afterDatasetsDraw(chart) {
        const { ctx, data, scales } = chart;
        data.datasets[0].data.forEach((val, i) => {
          const meta = chart.getDatasetMeta(0);
          const bar  = meta.data[i];
          const x    = scales.x.getPixelForValue(val);
          const y    = bar.y;
          const isIst = i === 0;
          ctx.save();
          ctx.fillStyle   = isIst ? color : '#8b949e';
          ctx.font        = `700 13px -apple-system,sans-serif`;
          ctx.textAlign   = val >= valZiel * .5 ? 'right' : 'left';
          ctx.textBaseline = 'middle';
          const offset = val >= valZiel * .5 ? -8 : 8;
          ctx.fillText(fmt(val), x + offset, y);
          ctx.restore();
        });
      }
    }]
  });
}

/* ── Load KW data ────────────────────────────────── */
async function loadKW(kw) {
  document.getElementById('dashboard').innerHTML =
    '<div class="loading"><div class="spinner"></div>Lade KW ' + kw + '…</div>';
  try {
    const res = await fetch(`data/kw${kw}.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    document.getElementById('headerSub').textContent =
      `KW ${data.kw} · ${data.dateRange}`;
    renderDashboard(data);
  } catch (err) {
    document.getElementById('dashboard').innerHTML =
      `<div class="loading">❌ Fehler beim Laden der Daten für KW ${kw}: ${err.message}</div>`;
    console.error(err);
  }
}

/* ── Bootstrap ───────────────────────────────────── */
loadKW(document.getElementById('kwSelect').value);
</script>
